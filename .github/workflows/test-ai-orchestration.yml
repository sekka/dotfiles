name: Test AI Orchestration

on:
  push:
    branches:
      - master
      - feature/*
    paths:
      - 'home/config/zsh/67_ai_availability.zsh'
      - 'scripts/system/ai-check.sh'
      - 'home/.claude/rules/ai-interface.md'
      - 'home/.claude/agents/**'
      - 'tests/**'
      - '.github/workflows/test-ai-orchestration.yml'
  pull_request:
    paths:
      - 'home/config/zsh/67_ai_availability.zsh'
      - 'scripts/system/ai-check.sh'
      - 'home/.claude/rules/ai-interface.md'
      - 'home/.claude/agents/**'
      - 'tests/**'

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install bats-core
          brew install jq
          brew install coreutils

      - name: Run unit tests
        run: bats tests/unit/*.bats

      - name: Run integration tests
        run: bats tests/integration/*.bats

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total tests: 77" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: 42" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests: 35" >> $GITHUB_STEP_SUMMARY

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: |
            /tmp/ai_*_test_*
          retention-days: 7
