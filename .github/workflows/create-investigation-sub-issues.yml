          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 10 - claudex
        id: issue10
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: EdamAme-x/claudex - Claude Code を OpenAI 互換エンドポイントで実行" \
