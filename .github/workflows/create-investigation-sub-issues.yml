          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 8 - opensourceprojects post
        id: issue8
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: opensourceprojects.dev の投稿 (993c493f)" \
            --body-file "docs/investigation/08-opensourceprojects-post.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 9 - yoshiko_pg difit
        id: issue9
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @yoshiko_pg のポスト - difit (GitHub スタイルのローカル diff ビューア)" \
