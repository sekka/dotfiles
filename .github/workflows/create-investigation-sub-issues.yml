name: Create Sub-Issues for Investigation #20

on:
  push:
    paths:
      - '.github/workflows/create-investigation-sub-issues.yml'
      - 'docs/investigation/*.md'
  workflow_dispatch:

jobs:
  create-sub-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: sekka/dotfiles
      PARENT_ISSUE: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create sub-issue 1 - googleworkspace/cli
        id: issue1
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: googleworkspace/cli (gws) - Google Workspace CLI" \
            --body-file "docs/investigation/01-googleworkspace-cli.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 2 - tomoaki_imai tweet
        id: issue2
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @tomoaki_imai のポスト (2030061902295093466)" \
            --body-file "docs/investigation/02-tomoaki_imai-tweet.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 3 - pouhiroshi tweet
        id: issue3
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @pouhiroshi のポスト (2030071072968871977)" \
            --body-file "docs/investigation/03-pouhiroshi-tweet.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 4 - azu_re tweet
        id: issue4
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @azu_re のポスト (2029936988670021940)" \
            --body-file "docs/investigation/04-azu_re-tweet.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 5 - tom_doerr tweet
        id: issue5
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @tom_doerr のポスト (2030040275079368847)" \
