      - name: Create sub-issue 14 - amagitakayosi tweet
        id: issue14
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @amagitakayosi のポスト (2028979494984499577)" \
            --body-file "docs/investigation/14-amagitakayosi-tweet.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 15 - oikon48 tweet
        id: issue15
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @oikon48 のポスト (2030171170885321056)" \
            --body-file "docs/investigation/15-oikon48-tweet.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 16 - ryoppippi ccusage
        id: issue16
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @ryoppippi のポスト - ccusage (Claude Code 使用量追跡 CLI)" \
            --body-file "docs/investigation/16-ryoppippi-ccusage.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 17 - kmizu tweet
        id: issue17
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @kmizu のポスト (2028446966997569933)" \
            --body-file "docs/investigation/17-kmizu-tweet.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Link sub-issues to parent issue #20 via GitHub sub-issues API
        run: |
          for ID in \
            "${{ steps.issue1.outputs.id }}" \
            "${{ steps.issue2.outputs.id }}" \
            "${{ steps.issue3.outputs.id }}" \
            "${{ steps.issue4.outputs.id }}" \
            "${{ steps.issue5.outputs.id }}" \
            "${{ steps.issue6.outputs.id }}" \
            "${{ steps.issue7.outputs.id }}" \
            "${{ steps.issue8.outputs.id }}" \
            "${{ steps.issue9.outputs.id }}" \
            "${{ steps.issue10.outputs.id }}" \
            "${{ steps.issue11.outputs.id }}" \
            "${{ steps.issue12.outputs.id }}" \
            "${{ steps.issue13.outputs.id }}" \
            "${{ steps.issue14.outputs.id }}" \
            "${{ steps.issue15.outputs.id }}" \
            "${{ steps.issue16.outputs.id }}" \
            "${{ steps.issue17.outputs.id }}"; do
            if [ -n "$ID" ]; then
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/$REPO/issues/$PARENT_ISSUE/sub_issues" \
                -F sub_issue_id="$ID" \
                && echo "Linked issue ID $ID as sub-issue" \
                || echo "Warning: Could not link issue ID $ID as sub-issue"
            fi
          done

      - name: Update parent issue #20 with sub-issue links
        run: |
          python3 docs/investigation/generate-parent-body.py \
            "${{ steps.issue1.outputs.num }}" \
            "${{ steps.issue2.outputs.num }}" \
            "${{ steps.issue3.outputs.num }}" \
            "${{ steps.issue4.outputs.num }}" \
            "${{ steps.issue5.outputs.num }}" \
            "${{ steps.issue6.outputs.num }}" \
            "${{ steps.issue7.outputs.num }}" \
            "${{ steps.issue8.outputs.num }}" \
            "${{ steps.issue9.outputs.num }}" \
            "${{ steps.issue10.outputs.num }}" \
            "${{ steps.issue11.outputs.num }}" \
            "${{ steps.issue12.outputs.num }}" \
            "${{ steps.issue13.outputs.num }}" \
            "${{ steps.issue14.outputs.num }}" \
            "${{ steps.issue15.outputs.num }}" \
            "${{ steps.issue16.outputs.num }}" \
            "${{ steps.issue17.outputs.num }}" \
            > /tmp/parent_body.md
          gh issue edit "$PARENT_ISSUE" --repo "$REPO" --body-file /tmp/parent_body.md
          echo "Updated parent issue #$PARENT_ISSUE with sub-issue links"
