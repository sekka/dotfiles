      - name: Create sub-issue 12 - suin tweet
        id: issue12
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @suin のポスト (2025525553823191550)" \
            --body-file "docs/investigation/12-suin-tweet.md")
          NUM=$(echo "$URL" | grep -oP '(?<=/issues/)\d+')
          ID=$(gh issue view "$NUM" --repo "$REPO" --json id --jq '.id')
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 13 - ctatedev agent-browser
        id: issue13
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: @ctatedev のポスト - Vercel agent-browser (AI エージェント用ブラウザ CLI)" \
