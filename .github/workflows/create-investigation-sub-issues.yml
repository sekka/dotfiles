          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Create sub-issue 7 - playcanvas editor
        id: issue7
        run: |
          URL=$(gh issue create --repo "$REPO" \
            --title "調査: playcanvas/editor - WebGL/WebGPU/WebXR ビジュアルエディタ" \
