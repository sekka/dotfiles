personality = "pragmatic"
model = "gpt-5.3-codex"

[core]
# デフォルトで非インタラクティブモードを使用
# codex exec コマンド使用時の承認・サンドボックスデフォルト
approval_policy = "never"
sandbox_mode = "workspace-write"

[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true

[projects."~/dotfiles"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
]

[plugins."github@openai-curated"]
enabled = true
