personality = "pragmatic"
model = "gpt-5.3-codex"

[core]
# デフォルトで非インタラクティブモードを使用
# codex exec コマンド使用時の承認・サンドボックスデフォルト
approval_policy = "never"
sandbox_mode = "workspace-write"

[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true

[projects."~/dotfiles"]
trust_level = "trusted"

[projects."~/src/github.com/sekka/diary"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "current-dir",
  "model-name",
  "project-root",
  "git-branch",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "codex-version",
  "context-window-size",
  "used-tokens",
  "total-input-tokens",
  "total-output-tokens",
]
