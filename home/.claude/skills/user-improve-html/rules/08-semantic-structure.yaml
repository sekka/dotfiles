category: semantic-structure
description: "セマンティック構造・ランドマークチェック"

rules:
  - id: one-h1-per-page
    name: "h1はページに1つ"
    severity: error
    wcag: "1.3.1"
    selector: "h1"
    check: unique-element
    why: "複数h1はページの主題が不明確になる"

  - id: heading-hierarchy
    name: "見出し階層のスキップなし"
    severity: error
    wcag: "1.3.1"
    selector: "h1, h2, h3, h4, h5, h6"
    check: heading-hierarchy
    why: "階層スキップは文書構造を壊しスクリーンリーダーでのナビゲーションを困難にする"

  - id: page-has-main
    name: "main要素の存在"
    severity: error
    wcag: "2.4.1"
    selector: "main"
    check: element-exists
    why: "main要素がないとスクリーンリーダーが主要コンテンツに直接移動できない"

  - id: nav-landmark
    name: "ナビゲーションにnav要素使用"
    severity: warning
    wcag: "1.3.1"
    selector: "[role='navigation']:not(nav)"
    check: should-be-element
    suggestion: nav
    why: "nav要素はセマンティックに正しく支援技術のサポートが広い"

  - id: footer-landmark
    name: "フッターにfooter要素使用"
    severity: warning
    wcag: "1.3.1"
    selector: "[role='contentinfo']:not(footer)"
    check: should-be-element
    suggestion: footer
    why: "footer要素はセマンティックに正しい"

  - id: search-landmark
    name: "検索にsearch要素/role使用"
    severity: info
    wcag: "1.3.1"
    selector: "form"
    check: custom
    function: check-search-form
    why: "検索フォームをランドマークとしてマークするとスクリーンリーダーで直接移動できる"

  - id: list-structure
    name: "リスト構造の正確性"
    severity: error
    wcag: "1.3.1"
    selector: "ul, ol, dl"
    check: custom
    function: check-list-structure
    why: "不正なリスト構造はスクリーンリーダーがリスト項目数を正しく伝えられない"

  - id: section-has-heading
    name: "sectionに見出しがあること"
    severity: warning
    wcag: "1.3.1"
    selector: "section"
    check: custom
    function: check-section-heading
    why: "見出しのないsectionはスクリーンリーダーでのナビゲーションで目的が不明"

  - id: deprecated-elements
    name: "非推奨要素の検出"
    severity: warning
    wcag: "BP"
    selector: "center, font, marquee, blink, big, strike, tt, acronym, applet, basefont, dir, frame, frameset, isindex, noframes"
    check: element-not-exists
    why: "非推奨要素はアクセシビリティサポートが不十分"

  - id: button-vs-link
    name: "リンクをボタンとして使用"
    severity: warning
    wcag: "BP"
    selector: "a[role='button'], a[href='#'], a[href='javascript:']"
    check: element-not-exists
    why: "リンクとボタンのセマンティクスが異なりキーボード操作が混乱する"

  - id: div-interactive
    name: "divにonclick等でインタラクティブ化"
    severity: error
    wcag: "4.1.2"
    selector: "div[onclick], span[onclick], div[onkeydown]:not([role]), span[onkeydown]:not([role])"
    check: element-not-exists
    why: "ネイティブのbutton/aを使わないとキーボード操作やスクリーンリーダーで問題が生じる"

  - id: blockquote-semantic
    name: "blockquoteのセマンティック使用"
    severity: info
    wcag: "1.3.1"
    selector: "blockquote"
    check: custom
    function: check-blockquote-usage
    why: "blockquoteはインデント目的ではなく引用に使用すべき"
