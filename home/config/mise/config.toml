description = "リッスン中のポート一覧（dev serverのみ・色付き表）"
run = "pnpm dlx port-whisperer"

[tasks.dev-ports-all]
description = "全リッスンポート（system含む）"
run = "pnpm dlx port-whisperer --all"

[tasks.dev-ports-clean]
