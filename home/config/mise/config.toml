# tmux設定再読み込み
[tasks.system-tmux-reload]
description = "tmux設定を再読み込み"
run = "tmux source-file ~/.tmux.conf && tmux display-message 'tmux設定を再読み込みしました'"

# zsh設定再読み込み
[tasks.system-zsh-reload]
description = "zshの設定を再読み込み"
shell = "zsh -c"
run = "source ~/.zshrc && echo '✅ zsh設定を再読み込みしました'"

# --------------------------------------
# ユーティリティ
# --------------------------------------
# Homebrew更新
[tasks.update-brew]
alias = "ub"
description = "Homebrew更新"
run = "bash ~/dotfiles/setup/02_brew.sh"

# Homebrew明示的インストールパッケージ一覧
[tasks.brew-leaves]
alias = "blv"
description = "明示的にインストールしたHomebrewパッケージとバージョンを表示"
run = "brew leaves | xargs brew list --versions"

# Brewfileとの照合
[tasks.brew-check]
alias = "bc"
description = "Brewfileで管理されていないパッケージを検出"
run = '''
bash -c '
brewfile_packages=$(grep "^brew \"" ~/dotfiles/setup/Brewfile | sed "s/^brew \"\([^\"]*\)\".*/\1/" | sort)
installed_packages=$(brew leaves | sort)
unmanaged=$(comm -13 <(echo "$brewfile_packages") <(echo "$installed_packages"))

if [ -z "$unmanaged" ]; then
  echo "✅ すべてのパッケージがBrewfileで管理されています"
else
  echo "⚠️  Brewfileで管理されていないパッケージ:"
  echo ""
  echo "$unmanaged" | while read -r pkg; do
    echo "  - $pkg"
  done
  echo ""
  echo "💡 これらをBrewfileに追加することを検討してください"
fi
'
'''

# batでファイルプレビュー
[tasks.util-bat]
description = "fzfでファイルを選択してbatで表示"
run = '''
file=$(find . -maxdepth 1 -type f | sort | fzf --preview "bat --color=always {}")
if [ -n "$file" ]; then
    bat "$file"
fi
'''

# hexylでバイナリプレビュー
[tasks.util-hexyl]
description = "fzfでファイルを選択してhexylで表示"
run = '''
file=$(find . -maxdepth 1 -type f | sort | fzf --preview "hexyl --length 256 {}")
if [ -n "$file" ]; then
    hexyl "$file"
fi
'''

