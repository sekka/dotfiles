echo "使用方法: pnpm dlx unlighthouse --site <URL>"
echo "例: pnpm dlx unlighthouse --site https://example.com"
"""

# Lighthouseでサイト全体をスキャン（CI用）
[tasks.perf-unlighthouse-ci]
